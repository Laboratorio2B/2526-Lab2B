name: learn-github-actions
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]

jobs:
  check-bitops
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cd 02struct
      - run: make bitops
      - run: bitops 94140480 101100111000111100000111111 > bitops.test
      - run: diff bitops.test bitops.check
      
